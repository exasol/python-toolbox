name: 'SPPE'
description: 'Set up python and poetry environment'

inputs:

  python-version:
    description: 'Python version to use'
    required: true
    default: "3.10"

  poetry-version:
    description: 'Poetry version to use'
    required: true
    default: "2.3.0"

  working-directory:
    description: 'Working directory to use'
    required: false
    default: "."

  extras:
    description: 'Comma-separated list of extras'
    required: false

  all-extras:
    description: 'Install all extras'
    required: false
    default: 'false'

  use-cache:
    description: 'Use cache for poetry environment'
    required: false
    default: 'true'

runs:

  using: "composite"
  steps:


    - name: Set up Python (${{ inputs.python-version}})
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Ensure wget
      shell: bash
      run: sudo apt update && sudo apt install -y wget

    - name: Set up Poetry (${{ inputs.poetry-version }})
      shell: bash
      run: | # zizmor: ignore[github-env] - This shared action is used by many workflows, and downstream steps need `poetry` on PATH; we do not have a safer replacement yet.
        POETRY_VERSION="${INPUTS_POETRY_VERSION}" "$PYTHON_BINARY" "${{ github.action_path }}/ext/get_poetry.py"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
      env:
        PYTHON_BINARY: "python${{ inputs.python-version }}"
        INPUTS_POETRY_VERSION: ${{ inputs.poetry-version }}

    - name: Setup cache variables
      id: setup-cache-variables
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        echo "ImageOS=$ImageOS"
        echo "ImageVersion=$ImageVersion"
        POETRY_ENV_PATH=$(poetry config virtualenvs.path)
        POETRY_SHA=$(cat pyproject.toml poetry.lock | sha256sum | cut -f 1 -d " ") #Remove trailing dash
        # output to GITHUB_OUTPUT
        echo "IMAGE_OS=$ImageOS" >> $GITHUB_OUTPUT
        echo "IMAGE_VERSION=$ImageVersion" >> $GITHUB_OUTPUT
        echo "POETRY_ENV_PATH=$POETRY_ENV_PATH" >>  $GITHUB_OUTPUT
        echo "POETRY_SHA=$POETRY_SHA" >> $GITHUB_OUTPUT

    - name: Cache Poetry environment
      if: inputs.use-cache == 'true'
      id: cache-poetry-env
      uses: actions/cache@v5
      with:
        path: ${{ steps.setup-cache-variables.outputs.POETRY_ENV_PATH }}
        key: poetry-env-${{ steps.setup-cache-variables.outputs.POETRY_SHA }}-${{ steps.setup-cache-variables.outputs.IMAGE_OS }}-${{ steps.setup-cache-variables.outputs.IMAGE_VERSION }}-${{ runner.arch }}-${{ inputs.poetry-version }}-${{ inputs.python-version }}-${{ inputs.extras }}-${{ inputs.all-extras }}

    - name: Poetry install with extras
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        EXTRAS="${INPUTS_EXTRAS}"
        ALL_EXTRAS="${INPUTS_ALL_EXTRAS}"
        EXTRAS_TRIMMED=$(echo "${EXTRAS}" | tr -d '[:space:],')

        if [[ "${ALL_EXTRAS}" == "true" && -n "${EXTRAS_TRIMMED}" ]]; then
          echo "Inputs 'extras' and 'all-extras' are mutually exclusive." >&2
          exit 1
        fi

        if [[ "${ALL_EXTRAS}" == "true" ]]; then
          poetry install --all-extras
        elif [[ -n "${EXTRAS_TRIMMED}" ]]; then
          NORMALIZED_EXTRAS=$(echo "${EXTRAS}" | tr ',' ' ')
          read -r -a EXTRAS_ARRAY <<< "${NORMALIZED_EXTRAS}"

          INSTALL_COMMAND=(poetry install)
          for EXTRA in "${EXTRAS_ARRAY[@]}"; do
            INSTALL_COMMAND+=(--extras "${EXTRA}")
          done

          "${INSTALL_COMMAND[@]}"
        else
          poetry install
        fi
      env:
        INPUTS_EXTRAS: ${{ inputs.extras }}
        INPUTS_ALL_EXTRAS: ${{ inputs.all-extras }}

    - name: Validate Poetry environment
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        poetry run python --version
        poetry run python --version | grep "${INPUTS_PYTHON_VERSION}"
      env:
        INPUTS_PYTHON_VERSION: ${{ inputs.python-version }}
