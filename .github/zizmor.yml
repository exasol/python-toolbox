rules:
  github-env:
    disable: true
  secrets-inherit:
    disable: true
  template-injection:
    disable: true
  unpinned-uses:
    config:
      policies:
        actions/checkout: hash-pin
        actions/cache: ref-pin
        actions/deploy-pages: ref-pin
        actions/download-artifact: hash-pin
        actions/setup-python: hash-pin
        actions/upload-artifact: hash-pin
        actions/upload-pages-artifact: hash-pin
        exasol/python-toolbox/.github/actions/python-environment: ref-pin
        ravsamhq/notify-slack-action: hash-pin
  use-trusted-publishing:
    disable: true
