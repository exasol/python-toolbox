name: Merge-Gate

on:
  workflow_call:
    inputs:
      root-event:
        description: GitHub event triggering the root workflow ci.yml
        required: false
        type: string
        default: unknown

jobs:
  run-fast-checks:
    name: Fast Checks
    uses: ./.github/workflows/checks.yml
    permissions:
      contents: read

  fast-report:
    name: Fast Report
    needs:
      - run-fast-checks
    uses: ./.github/workflows/report.yml
    with:
      upload-metrics: false
    secrets: inherit
    permissions:
      contents: read

  approve-run-slow-tests:
    name: Approve Running Slow Tests?
    if: ${{ inputs.root-event != 'scheduled' }}
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    # Even though the environment "manual-approval" will be created automatically,
    # it still needs to be configured to require interactive review.
    # See project settings on GitHub (Settings / Environments / manual-approval).
    environment: manual-approval
    steps:
      - name: Tests
        run: echo "Slow tests approved"

  run-slow-checks:
    name: Slow Checks
    needs:
      - approve-run-slow-tests
    uses: ./.github/workflows/slow-checks.yml
    secrets: inherit
    permissions:
      contents: read

  test-python-environment:
    name: Test python-environment Action
    needs:
      - approve-run-slow-tests
    uses: ./.github/workflows/test-python-environment.yml
    permissions:
      contents: read

  # This job ensures inputs have been executed successfully.
  allow-merge:
    name: Allow Merge
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    # If you need additional jobs to be part of the merge gate, add them below
    needs:
      - run-fast-checks
      - run-slow-checks
      - test-python-environment
    # Each job requires a step, so we added this dummy step.
    steps:
      - name: Approve
        run: echo "Merge Approved"
