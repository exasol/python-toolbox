# This workflow verifies if the python-environment Action is successful on each
# of the selected GitHub Runners.

name: Test python-environment Action

on:
  workflow_call:

jobs:
  check-changes:
    runs-on: "ubuntu-24.04"
    outputs:
      should_run: ${{ steps.diff.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: diff
        run: |
          # Always run if the current branch is main
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "Branch is main, forcing run."
            echo "should_run=true" >> $GITHUB_OUTPUT

          # Otherwise, check if any relevant files were changed in this PR
          else
            BASE_REF=${{ github.base_ref || 'main' }}
            if git diff --quiet "origin/$BASE_REF...HEAD" -- .github/actions/python-environment; then
              echo "No changes in .github/actions/python-environment, skipping."
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "Changes detected in directory, running."
              echo "should_run=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-matrix:
    name: Build Matrix
    needs:
      - check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    uses: ./.github/workflows/matrix-all.yml
    permissions:
      contents: read

  verify-poetry-setup:
    needs:
      - check-changes
      - build-matrix
    if: needs.check-changes.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - int-linux-x64-4core-gpu-t4-ubuntu24.04-1
          - int-linux-x64-4core-ubuntu24.04-1
          - int-linux-x64-2core-ubuntu24.04-1
        python-version: ${{ fromJson(needs.build-matrix.outputs.matrix).python-version }}
    name: Verify Poetry Setup for ${{ matrix.runner }} (Python-${{ matrix.python-version }})
    runs-on:
      labels: ${{ matrix.runner }}
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: ./.github/actions/python-environment
        with:
          python-version: "${{ matrix.python-version }}"
          poetry-version: "2.3.0"

      - name: Check Poetry Version
        id: check-poetry-version
        run: poetry --version

      - name: Validate Python Version
        id: validate-python-version
        run: |
          poetry run which python
          poetry run python --version
          poetry env list
          poetry run python --version | grep "${{ matrix.python-version }}"
