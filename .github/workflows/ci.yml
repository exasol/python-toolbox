name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # At 00:00 on every 7th day-of-month from 1 through 31. (https://crontab.guru)
    - cron: "0 0 1/7 * *"

jobs:
  inspect:
    runs-on: "ubuntu-24.04"
    steps:
      - name: Check trigger
        run: echo "is scheduled? ${{ github.event_name == 'schedule' }}"

  merge-gate:
    name: Merge Gate
    uses: ./.github/workflows/merge-gate.yml
    secrets: inherit
    permissions:
      contents: read

  report:
    name: Report
    needs:
      - merge-gate
    uses: ./.github/workflows/report.yml
    with:
      upload-metrics: ${{ github.event_name == 'schedule' }}
    secrets: inherit
    permissions:
      contents: read
