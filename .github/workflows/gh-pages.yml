name: Publish Documentation

on:
  workflow_call:
  workflow_dispatch:

jobs:

  build-documentation:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
        with:
          fetch-depth: 0

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: "exasol/python-toolbox/.github/actions/python-environment@de9c841d1e0c1d59b267900baf25da913330a25a"
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Build Documentation
        id: build-documentation
        run: |
          poetry run -- nox -s docs:multiversion
          mv .html-documentation html-documentation

      - name: Upload Artifact
        id: upload-artifact
        uses: "actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9"
        with:
          path: html-documentation

  deploy-documentation:
    needs:
      - build-documentation
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: "ubuntu-24.04"
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-to-github-pages
        uses: "actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128"
