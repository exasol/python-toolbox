name: Build Matrix

on:
  workflow_call:
    inputs:
      matrix_keys:
        description: "Space-separated BaseConfig keys to include in the generated matrix output"
        default: python_versions exasol_versions
        required: false
        type: string
    outputs:
      matrix:
        description: "Generates the requested build matrix"
        value: ${{ jobs.set-matrix.outputs.matrix }}

jobs:
  set-matrix:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v8
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Generate Matrix
        id: generate-matrix
        run: poetry run -- nox -s matrix:generate -- ${{ inputs.matrix_keys }}

      - name: Set Matrix
        id: set-matrix
        run: |
          echo "matrix=$(poetry run -- nox -s matrix:generate -- ${{ inputs.matrix_keys }})" >> $GITHUB_OUTPUT

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
