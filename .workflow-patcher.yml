workflows:
  - name: fast-tests
    step_customizations:
      - action: REPLACE
        job: run-unit-tests
        step_id: check-out-repository
        content:
          # The PTB has unit tests which require the fetch-depth to be 0.
          - name: Check out Repository
            id: check-out-repository
            uses: actions/checkout@v6
            with:
              fetch-depth: 0
