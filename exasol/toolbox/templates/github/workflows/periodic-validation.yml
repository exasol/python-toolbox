(( workflow_header ))
name: Periodic-Validation

on:
  schedule:
    # At 00:00 on Saturday. (https://crontab.guru)
    - cron: "0 0 * * 6"
  workflow_dispatch:

jobs:
  restrict-to-default-branch:
    name: Restrict to Default Branch
    runs-on: "(( os_version ))"
    permissions:
      contents: read

    steps:
      - name: Fail if not running on the default branch
        id: check-branch
        if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          CURRENT_BRANCH: ${{ github.ref }}
        run: |
          echo "Not running on the default branch. Current ref is: $CURRENT_BRANCH"
          exit 1

  run-fast-checks:
    name: Fast Checks
    uses: ./.github/workflows/checks.yml
    needs:
      - restrict-to-default-branch
    permissions:
      contents: read

  run-fast-tests:
    name: Fast Tests
    uses: ./.github/workflows/fast-tests.yml
    needs:
      - restrict-to-default-branch
    permissions:
      contents: read

  run-slow-checks:
    name: Slow Checks
    uses: ./.github/workflows/slow-checks.yml
    needs:
      - restrict-to-default-branch
    (% if custom_workflows["slow-checks"].secrets %)
    secrets:
      (% for secret_name in custom_workflows["slow-checks"].secrets %)
      (( secret_name )): ${{ secrets.(( secret_name )) }}
      (% endfor %)
    (% endif %)
    (% if custom_workflows["slow-checks"].permissions %)
    permissions:
      (% for permission_name, permission_level in custom_workflows["slow-checks"].permissions.items() %)
      (( permission_name )): (( permission_level ))
      (% endfor %)
    (% endif %)

  report:
    name: Report
    needs:
      - run-fast-checks
      - run-fast-tests
      - run-slow-checks
    uses: ./.github/workflows/report.yml
    secrets:
      (( sonar_token_name )): ${{ secrets.(( sonar_token_name )) }}
    permissions:
      contents: read
