(( workflow_header ))
(% from "_workflow_macros.j2" import workflow_passed_secrets, workflow_permissions with context %)
name: Fast-Tests

on:
  workflow_call:

jobs:
  run-unit-tests:
    name: Unit Tests (Python-${{ matrix.python-versions }})
    runs-on: "(( os_version ))"
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-versions: (( python_versions | tojson ))

    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v10
        with:
          python-version: ${{ matrix.python-versions }}
          poetry-version: "(( dependency_manager_version ))"

      - name: Run Unit Tests
        id: run-unit-tests
        run: poetry run -- nox -s test:unit -- --coverage

      - name: Upload Artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python${{ matrix.python-versions }}-fast
          path: .coverage
          include-hidden-files: true
          overwrite: false

(% if custom_workflows["fast-tests-extension"].exists %)
  fast-tests-extension:
    name: Extension
    uses: ./.github/workflows/fast-tests-extension.yml
(( workflow_passed_secrets("fast-tests-extension") -))
(( workflow_permissions("fast-tests-extension") ))
  (% endif %)
