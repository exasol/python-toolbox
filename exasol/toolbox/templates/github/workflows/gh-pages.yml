name: Publish Documentation

on:
  workflow_call:
  workflow_dispatch:

jobs:

  build-documentation:
    runs-on: "(( os_version ))"
    permissions:
      contents: read
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: "actions/checkout@(( github_action_pins.checkout ))"
        with:
          fetch-depth: 0

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: "exasol/python-toolbox/.github/actions/python-environment@(( github_action_pins.ptb_python ))"
        with:
          python-version: "(( minimum_python_version ))"
          poetry-version: "(( dependency_manager_version ))"

      - name: Build Documentation
        id: build-documentation
        run: |
          poetry run -- nox -s docs:multiversion
          mv .html-documentation html-documentation

      - name: Upload Artifact
        id: upload-artifact
        uses: "actions/upload-pages-artifact@(( github_action_pins.upload_pages_artifact ))"
        with:
          path: html-documentation

  deploy-documentation:
    needs:
      - build-documentation
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: "(( os_version ))"
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-to-github-pages
        uses: "actions/deploy-pages@(( github_action_pins.deploy_pages ))"
